services:
  # NUCLEUS: The Orchestrator
  nucleus:
    image: nexus-backend:5.0
    container_name: nexus-nucleus
    # build:
    #   context: ./modules/nexus-nucleus
    #   dockerfile: ./docker/dev/Dockerfile.nexus-nucleus
    # Port 8000 is internal only — all traffic goes through nginx on port 80.
    # Removing direct port exposure forces the correct nginx → Django path.
    # ports:
    #   - "8003:8000"
    volumes:
      - ./modules/nexus-nucleus:/nexus-nucleus
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - NEXUS_AI_URL=${NEXUS_AI_URL}
      - CENTRIFUGO_API_URL=${CENTRIFUGO_API_URL}
      - CENTRIFUGO_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_HMAC_SECRET=${CENTRIFUGO_HMAC_SECRET}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - NEURALOPS_INSTALL_TOKEN=${NEURALOPS_INSTALL_TOKEN}
      - NEURALOPS_PORTAL_URL=${NEURALOPS_PORTAL_URL:-https://neuralops-nexus-auth.mapax.io}
      - NEURALOPS_SERVER_URL=${NEURALOPS_SERVER_URL}
      - PYTHONPATH=/nexus-nucleus
      - AI_PROVIDER=${AI_PROVIDER}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE}
      - AIDER_MODEL=${AIDER_MODEL}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - AIDER_MAP_TOKENS=${AIDER_MAP_TOKENS}
    networks:
      - nexus-network
    depends_on:
      - postgres
      - redis
      - realtime
    working_dir: /nexus-nucleus
    command: >-
      uvicorn core.asgi:application
      --host 0.0.0.0
      --port 8000
      --reload

  # CELERY WORKER: Background Tasks
  nucleus-celery:
    image: nexus-backend:5.0
    container_name: nexus-celery
    volumes:
      - ./modules/nexus-nucleus:/nexus-nucleus
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_URL=${POSTGRES_URL}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - NEURALOPS_INSTALL_TOKEN=${NEURALOPS_INSTALL_TOKEN}
      - PYTHONPATH=/nexus-nucleus
    networks:
      - nexus-network
    depends_on:
      - postgres
      - redis
    working_dir: /nexus-nucleus
    command: tail -f /dev/null
    restart: unless-stopped

  # REDIS: Celery Broker & Result Backend + Centrifugo engine
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis_data:/data
    networks:
      - nexus-network
    restart: unless-stopped

  # NEXUS-AI: The Worker
  nexus-ai:
    image: nexus-ai:2.0
    container_name: nexus-ai
    build:
      context: ./modules/nexus-ai
      dockerfile: ./docker/dev/Dockerfile.nexus-ai
    ports:
      - "8000:8000"
    volumes:
      - ./modules/nexus-ai:/nexus-ai
    environment:
      - CHROMA_HOST=${CHROMA_HOST}
      - CHROMA_PORT=${CHROMA_PORT}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - MODEL_NAME=${MODEL_NAME}
      - PYTHONPATH=/nexus-ai
    networks:
      - nexus-network
    depends_on:
      - chromadb
    working_dir: /nexus-ai
    command: >
      sh -c "export PYTHONPATH=$PYTHONPATH:/nexus-ai && 
             python3 -m uvicorn apps.main:app --host 0.0.0.0 --port 8000 --reload"

  # REALTIME: Centrifugo transport with Redis engine
  realtime:
    image: noamanfaisal/nexus-transport:6.0
    container_name: nexus-transport
    # Port 8000 is internal only — nginx proxies /connection/websocket to it
    # Config file keys unknown for v6.6.2-nexus — using env vars instead.
    # CENTRIFUGO_ALLOWED_ORIGINS: space-separated list of allowed WebSocket origins.
    # Run `nexus-transport --help | grep origin` to find the exact flag/key names.
    environment:
      - CENTRIFUGO_HTTP_API_KEY=${CENTRIFUGO_API_KEY}
      - CENTRIFUGO_ALLOWED_ORIGINS=http://192.168.1.90:3000
    command: >
      nexus-transport
      --admin.enabled
      --admin.insecure
      --client.insecure
      --http_api.insecure
    networks:
      - nexus-network
    depends_on:
      - redis

  # NGINX: Reverse proxy — single entry point for all clients
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - nexus-network
    depends_on:
      - nucleus
      - realtime
    restart: unless-stopped

  # CHROMADB & POSTGRES
  chromadb:
    image: chromadb/chroma:latest
    container_name: nexus-chroma
    volumes:
      - ./data/chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - nexus-network

  postgres:
    image: postgres:17-alpine
    container_name: nexus-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-network

  # NEURALOPS REACT APP: The UI
  neuralops-react-app:
    build:
      context: ./modules/neuralops-react-app
      dockerfile: Dockerfile
    container_name: neuralops-react-app
    ports:
      - "3000:3000"
    volumes:
      - ./modules/neuralops-react-app:/app
    networks:
      - nexus-network
    depends_on:
      - nucleus
    restart: unless-stopped

networks:
  nexus-network:
    driver: bridge
