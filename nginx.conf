events {
    worker_connections 1024;
}

http {
    # Docker's internal DNS — resolves upstreams at request time, not at startup.
    # Without this, nginx crashes on boot if any upstream container isn't ready yet.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    client_max_body_size 50m;

    server {
        listen 80;

        # ── Django REST API ─────────────────────────────────────────────────
        location /api/ {
            set $django nucleus:8000;
            proxy_pass         http://$django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── Django admin ────────────────────────────────────────────────────
        location /admin/ {
            set $django nucleus:8000;
            proxy_pass         http://$django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        # ── Centrifugo WebSocket ─────────────────────────────────────────────
        # React connects here for real-time message delivery.
        # Origin header is stripped before proxying: nexus-transport v6.6.2-nexus
        # has no env var or flag to configure allowed_origins, but it skips the
        # origin check when no Origin header is present. nginx is our trust boundary.
        location /connection/websocket {
            set $centrifugo realtime:8000;
            proxy_pass             http://$centrifugo;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade    $http_upgrade;
            proxy_set_header       Connection "upgrade";
            proxy_set_header       Host       $host;
            proxy_set_header       Origin     "";   # strip — bypasses nexus-transport origin check
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
        }

        # ── Centrifugo SSE fallback ──────────────────────────────────────────
        location /connection/sse {
            set $centrifugo realtime:8000;
            proxy_pass             http://$centrifugo;
            proxy_http_version     1.1;
            proxy_set_header       Host       $host;
            proxy_set_header       Origin     "";   # strip — same reason
            proxy_read_timeout     3600s;
            proxy_buffering        off;
        }
    }
}
